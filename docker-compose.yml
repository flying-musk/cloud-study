version: '3.8'

services:
  app:
    image: flyingmusk320/mars-app:v1.1
    expose:
      - "8080"
    environment:
      - APP_NAME=Mars-Cloud-With-Nginx
      - REDIS_ADDR=my-redis:6379
    networks:
      - cloud-network

  web-proxy:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - cloud-network
    depends_on:
      - app

  my-redis:
    image: redis:alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - cloud-network

  insight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    networks:
      - cloud-network

networks:
  cloud-network:

volumes:
  redis-data: